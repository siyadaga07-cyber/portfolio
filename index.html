<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siya's Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #333;
    transition: 0.3s;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: white;
    position: sticky;
    top: 0;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: #555;
}

.nav-links a:hover {
    color: #4F46E5;
}

.dark-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero img {
    width: 150px;
    border-radius: 50%;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: #4F46E5;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #3730A3;
    transform: scale(1.1);
}

/* ABOUT */
.about {
    padding: 80px 20px;
    text-align: center;
}

/* PROJECTS */
.projects {
    padding: 80px 20px;
    background: white;
    text-align: center;
}

.project-box {
    display: inline-block;
    width: 250px;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    background: #f1f3f9;
    transition: 0.3s;
}

.project-box:hover {
    transform: translateY(-10px) scale(1.05);
}

/* CONTACT */
.contact {
    padding: 80px 20px;
    text-align: center;
}

.contact input, .contact textarea {
    width: 250px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}

/* DARK MODE */
.dark-mode {
    background: #111;
    color: #eee;
}

.dark-mode .navbar {
    background: #1a1a1a;
}

.dark-mode .projects {
    background: #1a1a1a;
}

.dark-mode .project-box {
    background: #222;
}

.dark-mode a {
    color: #ddd;
}

/* ANIMATIONS */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease forwards;
}

.delay-1 { animation-delay: 0.3s; }
.delay-2 { animation-delay: 0.6s; }
.delay-3 { animation-delay: 0.9s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Siya</b></div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>

    <button onclick="toggleDark()" class="dark-btn">🌙</button>
</div>

<!-- HERO -->
<section class="hero fade-in">
    <img src="profile.jpg" alt="My Photo">
    <h1>Hi, I'm Siya 👋</h1>
    <p>I am a beginner web designer</p>
</section>

<!-- ABOUT -->
<section class="about fade-in delay-1" id="about">
    <h2>About Me</h2>
    <p>I love creating modern and clean websites.</p>
</section>

<!-- PROJECTS -->
<section class="projects fade-in delay-2" id="projects">
    <h2>My Projects</h2>

    <div class="project-box">
        <h3>Portfolio Website</h3>
        <p>HTML & CSS</p>
    </div>

    <div class="project-box">
        <h3>Landing Page</h3>
        <p>Modern UI Design</p>
    </div>

    <div class="project-box">
        <h3>Figma Design</h3>
        <p>UI/UX Practice</p>
    </div>
</section>

<!-- CONTACT -->
<section class="contact fade-in delay-3" id="contact">
    <h2>Contact Me</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="01b24ed1-0a05-4ebf-a562-6cb4048676fd">

        <input type="text" name="name" placeholder="Your Name" required><br><br>
        <input type="email" name="email" placeholder="Your Email" required><br><br>
        <textarea name="message" placeholder="Your Message" required></textarea><br><br>

        <button type="submit" class="btn">Send Message</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    © 2026 Siya
</footer>

<!-- DARK MODE SCRIPT -->
<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");

    let btn = document.querySelector(".dark-btn");
    btn.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
}
</script>

</body>
</html>
