<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siya's Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #333;
    transition: 0.3s;
    cursor: none;
}

/* CURSOR */
.cursor {
    width: 20px;
    height: 20px;
    border: 2px solid #4F46E5;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: white;
    position: sticky;
    top: 0;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: #555;
}

.dark-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero img {
    width: 150px;
    border-radius: 50%;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: #4F46E5;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

/* SECTIONS */
.about, .contact {
    padding: 80px 20px;
    text-align: center;
}

.projects {
    padding: 80px 20px;
    background: white;
    text-align: center;
}

.project-box {
    display: inline-block;
    width: 250px;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    background: #f1f3f9;
    transition: 0.3s;
}

.project-box:hover {
    transform: translateY(-10px) scale(1.05);
}

/* FORM */
.contact input, .contact textarea {
    width: 250px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* DARK MODE */
.dark-mode {
    background: #111;
    color: #eee;
}

.dark-mode .navbar {
    background: #1a1a1a;
}

.dark-mode .projects {
    background: #1a1a1a;
}

.dark-mode .project-box {
    background: #222;
}

/* ANIMATION */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s ease forwards;
}

.delay-1 { animation-delay: 0.3s; }
.delay-2 { animation-delay: 0.6s; }
.delay-3 { animation-delay: 0.9s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TYPING CURSOR */
#typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor"></div>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Siya</b></div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>

    <button onclick="toggleDark()" class="dark-btn">🌙</button>
</div>

<!-- HERO -->
<section class="hero fade-in">
    <img src="profile.jpg" alt="">
    <h1>Hi, I'm Siya 👋</h1>
    <p id="typing"></p>
</section>

<!-- ABOUT -->
<section class="about fade-in delay-1" id="about">
    <h2>About Me</h2>
    <p>I love creating modern and clean websites.</p>
</section>

<!-- PROJECTS -->
<section class="projects fade-in delay-2" id="projects">
    <h2>My Projects</h2>

    <div class="project-box">Portfolio Website</div>
    <div class="project-box">Landing Page</div>
    <div class="project-box">Figma Design</div>
</section>

<!-- CONTACT -->
<section class="contact fade-in delay-3" id="contact">
    <h2>Contact Me</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="01b24ed1-0a05-4ebf-a562-6cb4048676fd">

        <input type="text" name="name" placeholder="Your Name" required><br><br>
        <input type="email" name="email" placeholder="Your Email" required><br><br>
        <textarea name="message" placeholder="Your Message" required></textarea><br><br>

        <button class="btn">Send</button>
    </form>
</section>

<footer style="text-align:center; padding:20px;">© 2026 Siya</footer>

<script>
/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

/* TYPING */
const text = "Aspiring Web Designer | Creative Learner 🚀";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
window.onload = typeEffect;

/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", (e) => {
    cursor.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
});

/* HOVER EFFECT */
document.querySelectorAll("a, button").forEach(el => {
    el.addEventListener("mouseenter", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(1.8)";
    });
    el.addEventListener("mouseleave", () => {
        cursor.style.transform = "translate(-50%, -50%) scale(1)";
    });
});
</script>

</body>
</html>
