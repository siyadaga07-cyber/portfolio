<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siya's Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: #333;
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 56px;
    font-weight: 600;
}

.hero p {
    font-size: 22px;
    color: #666;
    margin-top: 10px;
}

.hero img {
    width: 140px;
    border-radius: 50%;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 28px;
    background: #0071E3;
    color: white;
    border-radius: 20px;
    text-decoration: none;
    font-size: 16px;
}

/* SECTIONS */
section {
    padding: 100px 20px;
    text-align: center;
}

/* PROJECTS */
.projects {
    background: #f5f5f7;
}

.project-box {
    background: white;
    padding: 30px;
    margin: 15px;
    border-radius: 20px;
    display: inline-block;
    width: 260px;
    transition: 0.3s;
}

.project-box:hover {
    transform: translateY(-10px);
}

/* CONTACT */
input, textarea {
    width: 260px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* TYPING CURSOR */
#typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% {opacity: 0;}
}

/* SMOOTH ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Siya</b></div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero fade">
    <img src="profile.jpg">
    <h1>Hi, I'm Siya</h1>
    <p id="typing"></p>
    <a href="#contact" class="btn">Contact Me</a>
</section>

<!-- ABOUT -->
<section id="about" class="fade">
    <h2>About Me</h2>
    <p>I design clean, minimal and modern websites inspired by Apple-style UI.</p>
</section>

<!-- PROJECTS -->
<section id="projects" class="projects fade">
    <h2>My Projects</h2>

    <div class="project-box">
        <h3>Portfolio Website</h3>
        <p>Minimal clean UI</p>
    </div>

    <div class="project-box">
        <h3>Landing Page</h3>
        <p>Modern design concept</p>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade">
    <h2>Contact Me</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="01b24ed1-0a05-4ebf-a562-6cb4048676fd">

        <input type="text" name="name" placeholder="Your Name" required><br><br>
        <input type="email" name="email" placeholder="Your Email" required><br><br>
        <textarea name="message" placeholder="Your Message" required></textarea><br><br>

        <button class="btn">Send Message</button>
    </form>
</section>

<footer style="text-align:center; padding:30px; color:#888;">
    © 2026 Siya
</footer>

<script>
/* TYPING EFFECT */
const text = "Creative Designer | Web Developer 🚀";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
window.onload = typeEffect;
</script>

</body>
</html>
