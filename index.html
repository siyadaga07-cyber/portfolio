<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Siya's Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            text-align: center;
        }

        /* NAVBAR */
        .navbar {
            padding: 20px;
        }

        .navbar a {
            margin: 0 15px;
            text-decoration: none;
            color: #555;
            font-weight: bold;
        }

        /* IMAGE */
        .profile {
            margin-top: 40px;
        }

        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* TEXT */
        h1 {
            margin-top: 30px;
            font-size: 42px;
            color: #222;
        }

        p {
            font-size: 20px;
            color: #555;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #4F46E5;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
        }

        .btn:hover {
            background-color: #3730A3;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <!-- PROFILE IMAGE -->
    <div class="profile">
        <img src="profile.jpg" alt="My Photo">
    </div>

    <!-- TEXT -->
    <h1>Siya's Portfolio</h1>
    <p>I am a beginner web designer</p>

    <!-- BUTTON -->
    <a href="#" class="btn">Contact Me</a>

</body>
</html>
