<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siya's Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4F46E5, #9333EA);
    color: #fff;
    cursor: none;
}

/* GLASS EFFECT */
.glass {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
}

/* CURSOR */
.cursor {
    width: 20px;
    height: 20px;
    border: 2px solid white;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    margin: 10px;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
}

.dark-btn {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero img {
    width: 150px;
    border-radius: 50%;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: rgba(255,255,255,0.2);
    color: white;
    border-radius: 10px;
    text-decoration: none;
}

/* PROJECTS */
.projects, .about, .contact {
    margin: 20px;
}

.project-box {
    margin: 10px;
    padding: 20px;
}

/* FORM */
.contact input, .contact textarea {
    width: 250px;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* TYPING */
#typing::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% {opacity: 0;}
}
</style>
</head>

<body>

<div class="cursor"></div>

<!-- NAVBAR -->
<div class="navbar glass">
    <div><b>Siya</b></div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>

    <button onclick="toggleDark()" class="dark-btn">🌙</button>
</div>

<!-- HERO -->
<section class="hero glass">
    <img src="profile.jpg">
    <h1>Hi, I'm Siya 👋</h1>
    <p id="typing"></p>
</section>

<!-- ABOUT -->
<section class="about glass" id="about">
    <h2>About Me</h2>
    <p>I create modern and stylish websites.</p>
</section>

<!-- PROJECTS -->
<section class="projects glass" id="projects">
    <h2>My Projects</h2>
    <div class="project-box glass">Portfolio Website</div>
    <div class="project-box glass">Landing Page</div>
</section>

<!-- CONTACT -->
<section class="contact glass" id="contact">
    <h2>Contact Me</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="01b24ed1-0a05-4ebf-a562-6cb4048676fd">

        <input type="text" name="name" placeholder="Your Name" required><br><br>
        <input type="email" name="email" placeholder="Your Email" required><br><br>
        <textarea name="message" placeholder="Your Message" required></textarea><br><br>

        <button class="btn">Send</button>
    </form>
</section>

<footer style="text-align:center; padding:20px;">© 2026 Siya</footer>

<script>
/* TYPING */
const text = "Creative Designer | Web Developer 🚀";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
window.onload = typeEffect;

/* CURSOR */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove", e => {
    cursor.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
});
</script>

</body>
</html>
